<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Circolo Berkeley</title>
    <!-- CSS files -->
    <link rel="stylesheet" href="../style.css">  
    <link rel="stylesheet" href="../responsive.css">
    <link rel="stylesheet" href="../about.css">
</head>

<body class="committee-page">
    <!-- Header loaded from shared file -->
    <div id="header-placeholder"></div>

    <main class="about-main">
        <h1 class="subpage-heading">Toddlers Review</h1>
        <p>Toddlers are a special group in our community, 
            and their reviews help us improve our programming for families.</p>
    </main> <!-- Close main -->

    <!-- Footer loaded from shared file -->
    <div id="footer-placeholder"></div>

    <script>
        // Load header
        fetch('../global-header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            });

        // Load footer
        fetch('../global-footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>
</body>
</html>
